AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Bootstrap IAM resources for GitHub Actions OIDC authentication and
  production deployment roles for aws-cloud-ai-web.

Parameters:
  GitHubRepositoryOwner:
    Type: String
    Description: GitHub repository owner or organization.
    Default: herrerogusano

  GitHubRepositoryName:
    Type: String
    Description: GitHub repository name.
    Default: aws-cloud-ai-web

  FrontendBucketName:
    Type: String
    Description: Existing S3 bucket used for frontend deployment.
    Default: aws-cloud-ai-web-herrerogusano-frontend

  BackendStackName:
    Type: String
    Description: Existing CloudFormation stack updated by AWS SAM.
    Default: aws-cloud-ai-web-backend

  SamArtifactBucketName:
    Type: String
    Description: Existing private S3 bucket used by AWS SAM deployment uploads.
    Default: aws-sam-cli-managed-default-samclisourcebucket-tptpcw2u9y7f

  ExistingGitHubOidcProviderArn:
    Type: String
    Description: >
      Existing GitHub OIDC provider ARN. Leave empty to create
      token.actions.githubusercontent.com in this stack.
    Default: ""

Conditions:
  CreateGitHubOidcProvider: !Equals [!Ref ExistingGitHubOidcProviderArn, ""]

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateGitHubOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com

  GitHubFrontendDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: aws-cloud-ai-web-github-frontend-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateGitHubOidcProvider
                - !Ref GitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubRepositoryOwner}/${GitHubRepositoryName}:ref:refs/heads/main
      Policies:
        - PolicyName: aws-cloud-ai-web-frontend-sync
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ListFrontendBucket
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !Sub arn:aws:s3:::${FrontendBucketName}
              - Sid: SyncFrontendObjects
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub arn:aws:s3:::${FrontendBucketName}/*
      Tags:
        - Key: Project
          Value: aws-cloud-ai-web
        - Key: Purpose
          Value: github-frontend-deploy

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: aws-cloud-ai-web-cloudformation-execution
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: aws-cloud-ai-web-stack-execution
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ManageProjectFunction
                Effect: Allow
                Action:
                  - lambda:AddPermission
                  - lambda:CreateFunction
                  - lambda:CreateFunctionUrlConfig
                  - lambda:DeleteFunction
                  - lambda:DeleteFunctionUrlConfig
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:GetFunctionUrlConfig
                  - lambda:GetPolicy
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:UpdateFunctionUrlConfig
                Resource: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:aws-cloud-ai-web-backend-handler
              - Sid: ManageProjectLogGroup
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DeleteRetentionPolicy
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/aws-cloud-ai-web-backend-handler
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/aws-cloud-ai-web-backend-handler:*
              - Sid: ManageFrontendBucketInfrastructure
                Effect: Allow
                Action:
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketLocation
                  - s3:GetBucketOwnershipControls
                  - s3:GetBucketPolicy
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketTagging
                  - s3:GetBucketWebsite
                  - s3:PutBucketOwnershipControls
                  - s3:PutBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketTagging
                  - s3:PutBucketWebsite
                Resource: !Sub arn:aws:s3:::${FrontendBucketName}
              - Sid: ManageLambdaExecutionRole
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/${BackendStackName}-*
              - Sid: PassLambdaExecutionRoleToLambda
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/${BackendStackName}-*
                Condition:
                  StringEquals:
                    iam:PassedToService: lambda.amazonaws.com
      Tags:
        - Key: Project
          Value: aws-cloud-ai-web
        - Key: Purpose
          Value: cloudformation-stack-execution

  GitHubBackendDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: aws-cloud-ai-web-github-backend-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateGitHubOidcProvider
                - !Ref GitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubRepositoryOwner}/${GitHubRepositoryName}:ref:refs/heads/main
      Policies:
        - PolicyName: aws-cloud-ai-web-backend-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ManageProjectStack
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStacks
                  - cloudformation:GetTemplate
                Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${BackendStackName}/*
              - Sid: ManageProjectChangeSets
                Effect: Allow
                Action:
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:changeSet/*
              - Sid: ValidateTemplates
                Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                Resource: "*"
              - Sid: AccessSamArtifactBucket
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                Resource: !Sub arn:aws:s3:::${SamArtifactBucketName}
              - Sid: UploadSamArtifacts
                Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetObject
                  - s3:ListMultipartUploadParts
                  - s3:PutObject
                Resource: !Sub arn:aws:s3:::${SamArtifactBucketName}/*
              - Sid: PassCloudFormationExecutionRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt CloudFormationExecutionRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: cloudformation.amazonaws.com
      Tags:
        - Key: Project
          Value: aws-cloud-ai-web
        - Key: Purpose
          Value: github-backend-deploy

Outputs:
  GitHubOidcProviderArn:
    Description: GitHub OIDC provider ARN used by the deployment role.
    Value: !If
      - CreateGitHubOidcProvider
      - !Ref GitHubOidcProvider
      - !Ref ExistingGitHubOidcProviderArn

  GitHubFrontendDeployRoleArn:
    Description: Role ARN for GitHub Actions frontend deployment.
    Value: !GetAtt GitHubFrontendDeployRole.Arn

  GitHubBackendDeployRoleArn:
    Description: Role ARN for GitHub Actions backend deployment.
    Value: !GetAtt GitHubBackendDeployRole.Arn

  CloudFormationExecutionRoleArn:
    Description: Role ARN used by CloudFormation during SAM deployment.
    Value: !GetAtt CloudFormationExecutionRole.Arn
