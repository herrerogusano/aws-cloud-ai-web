name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-frontend
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_FRONTEND_BUCKET: ${{ vars.AWS_FRONTEND_BUCKET }}
  AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v3

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          : "${AWS_REGION:?Missing repository variable AWS_REGION}"
          : "${AWS_FRONTEND_BUCKET:?Missing repository variable AWS_FRONTEND_BUCKET}"
          : "${AWS_DEPLOY_ROLE_ARN:?Missing repository variable AWS_DEPLOY_ROLE_ARN}"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest

      - name: Validate SAM template
        run: sam validate

      - name: Build SAM application
        run: sam build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Confirm target bucket exists
        shell: bash
        run: |
          set -euo pipefail
          aws s3api head-bucket --bucket "$AWS_FRONTEND_BUCKET"

      - name: Sync frontend assets to S3
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync frontend/ "s3://$AWS_FRONTEND_BUCKET" --delete \
            --exclude "config.example.js" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "*.map" \
            --exclude ".DS_Store" \
            --exclude "Thumbs.db"

      - name: Set no-cache headers for entrypoint files
        shell: bash
        run: |
          set -euo pipefail
          aws s3 cp frontend/index.html "s3://$AWS_FRONTEND_BUCKET/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"
          aws s3 cp frontend/config.js "s3://$AWS_FRONTEND_BUCKET/config.js" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/javascript; charset=utf-8"

      - name: Confirm expected files exist in S3
        shell: bash
        run: |
          set -euo pipefail
          aws s3 ls "s3://$AWS_FRONTEND_BUCKET/index.html"
          aws s3 ls "s3://$AWS_FRONTEND_BUCKET/styles.css"
          aws s3 ls "s3://$AWS_FRONTEND_BUCKET/app.js"
          aws s3 ls "s3://$AWS_FRONTEND_BUCKET/config.js"

      - name: Determine website URL
        id: website
        shell: bash
        run: |
          set -euo pipefail
          echo "url=http://$AWS_FRONTEND_BUCKET.s3-website-$AWS_REGION.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Smoke check deployed website
        run: python scripts/check_frontend_website.py "${{ steps.website.outputs.url }}"

      - name: Summarize deployment
        shell: bash
        run: |
          {
            echo "## Frontend deployment"
            echo
            echo "- Bucket: \`$AWS_FRONTEND_BUCKET\`"
            echo "- Region: \`$AWS_REGION\`"
            echo "- Website URL: ${{ steps.website.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
