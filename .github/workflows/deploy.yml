name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deployment
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_BACKEND_DEPLOY_ROLE_ARN: ${{ vars.AWS_BACKEND_DEPLOY_ROLE_ARN }}
  AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN: ${{ vars.AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN }}
  AWS_FRONTEND_DEPLOY_ROLE_ARN: ${{ vars.AWS_FRONTEND_DEPLOY_ROLE_ARN }}
  AWS_FRONTEND_BUCKET: ${{ vars.AWS_FRONTEND_BUCKET }}
  SAM_ARTIFACT_BUCKET: ${{ vars.SAM_ARTIFACT_BUCKET }}
  SAM_STACK_NAME: ${{ vars.SAM_STACK_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v3

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          : "${AWS_REGION:?Missing repository variable AWS_REGION}"
          : "${AWS_BACKEND_DEPLOY_ROLE_ARN:?Missing repository variable AWS_BACKEND_DEPLOY_ROLE_ARN}"
          : "${AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN:?Missing repository variable AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN}"
          : "${AWS_FRONTEND_DEPLOY_ROLE_ARN:?Missing repository variable AWS_FRONTEND_DEPLOY_ROLE_ARN}"
          : "${AWS_FRONTEND_BUCKET:?Missing repository variable AWS_FRONTEND_BUCKET}"
          : "${SAM_ARTIFACT_BUCKET:?Missing repository variable SAM_ARTIFACT_BUCKET}"
          : "${SAM_STACK_NAME:?Missing repository variable SAM_STACK_NAME}"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest

      - name: Validate SAM template
        run: sam validate

      - name: Build SAM application
        run: sam build

      - name: Configure AWS credentials for backend deployment
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_BACKEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Confirm backend deployment prerequisites
        shell: bash
        run: |
          set -euo pipefail
          aws cloudformation describe-stacks --stack-name "$SAM_STACK_NAME" --region "$AWS_REGION" >/dev/null
          aws s3api head-bucket --bucket "$SAM_ARTIFACT_BUCKET"

      - name: Deploy backend and infrastructure with SAM
        id: sam_deploy
        shell: bash
        run: |
          set -euo pipefail
          sam deploy \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --no-resolve-s3 \
            --s3-bucket "$SAM_ARTIFACT_BUCKET" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --role-arn "$AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN" \
            2>&1 | tee sam-deploy.log

          if grep -q "No changes to deploy" sam-deploy.log; then
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes_detected=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Retrieve deployed stack outputs
        id: stack_outputs
        shell: bash
        run: |
          set -euo pipefail
          function_url="$(aws cloudformation describe-stacks \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='QuestionHandlerFunctionUrl'].OutputValue | [0]" \
            --output text)"
          website_url="$(aws cloudformation describe-stacks \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendWebsiteUrl'].OutputValue | [0]" \
            --output text)"
          frontend_bucket_output="$(aws cloudformation describe-stacks \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendWebsiteBucketName'].OutputValue | [0]" \
            --output text)"

          [[ "$function_url" != "None" && -n "$function_url" ]]
          [[ "$website_url" != "None" && -n "$website_url" ]]
          [[ "$frontend_bucket_output" != "None" && -n "$frontend_bucket_output" ]]

          if [[ "$frontend_bucket_output" != "$AWS_FRONTEND_BUCKET" ]]; then
            echo "Frontend bucket output '$frontend_bucket_output' does not match configured bucket '$AWS_FRONTEND_BUCKET'" >&2
            exit 1
          fi

          echo "function_url=$function_url" >> "$GITHUB_OUTPUT"
          echo "website_url=$website_url" >> "$GITHUB_OUTPUT"

      - name: Smoke check backend endpoint without invoking Bedrock
        run: python scripts/check_backend_endpoint.py "${{ steps.stack_outputs.outputs.function_url }}"

      - name: Configure AWS credentials for frontend sync
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_FRONTEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Confirm target bucket exists
        shell: bash
        run: |
          set -euo pipefail
          aws s3api head-bucket --bucket "$AWS_FRONTEND_BUCKET"

      - name: Sync frontend assets to S3
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync frontend/ "s3://$AWS_FRONTEND_BUCKET" --delete \
            --exclude "config.example.js" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "*.map" \
            --exclude ".DS_Store" \
            --exclude "Thumbs.db"

      - name: Set no-cache headers for entrypoint files
        shell: bash
        run: |
          set -euo pipefail
          aws s3 cp frontend/index.html "s3://$AWS_FRONTEND_BUCKET/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"
          aws s3 cp frontend/config.js "s3://$AWS_FRONTEND_BUCKET/config.js" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/javascript; charset=utf-8"

      - name: Confirm expected files exist in S3
        shell: bash
        run: |
          set -euo pipefail
          aws s3 ls "s3://$AWS_FRONTEND_BUCKET/index.html"
          aws s3 ls "s3://$AWS_FRONTEND_BUCKET/styles.css"
          aws s3 ls "s3://$AWS_FRONTEND_BUCKET/app.js"
          aws s3 ls "s3://$AWS_FRONTEND_BUCKET/config.js"

      - name: Smoke check deployed frontend website
        run: python scripts/check_frontend_website.py "${{ steps.stack_outputs.outputs.website_url }}"

      - name: Summarize deployment
        shell: bash
        run: |
          {
            echo "## Production deployment"
            echo
            echo "- Stack: \`$SAM_STACK_NAME\`"
            echo "- Region: \`$AWS_REGION\`"
            echo "- SAM changes detected: \`${{ steps.sam_deploy.outputs.changes_detected }}\`"
            echo "- Frontend bucket: \`$AWS_FRONTEND_BUCKET\`"
            echo "- Backend URL: ${{ steps.stack_outputs.outputs.function_url }}"
            echo "- Frontend URL: ${{ steps.stack_outputs.outputs.website_url }}"
            echo "- Backend smoke check: passed"
            echo "- Frontend smoke check: passed"
          } >> "$GITHUB_STEP_SUMMARY"
