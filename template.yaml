AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Minimal backend infrastructure for aws-cloud-ai-web with a public Lambda Function URL.

Resources:
  QuestionHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      FunctionName: aws-cloud-ai-web-backend-handler
      Handler: backend.handler.lambda_handler
      Runtime: python3.13
      Architectures:
        - x86_64
      Timeout: 20
      MemorySize: 128
      Description: Bedrock-backed backend for the aws-cloud-ai-web portfolio project.
      Environment:
        Variables:
          BEDROCK_MODEL_ID: eu.amazon.nova-micro-v1:0
          BEDROCK_MAX_TOKENS: "500"
          BEDROCK_TEMPERATURE: "0.3"
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Sid: InvokeNovaMicroInferenceProfile
              Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:GetInferenceProfile
              Resource:
                - arn:aws:bedrock:eu-west-1:344774635844:inference-profile/eu.amazon.nova-micro-v1:0
            - Sid: InvokeNovaMicroFoundationModelViaProfile
              Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:eu-west-1::foundation-model/amazon.nova-micro-v1:0
                - arn:aws:bedrock:eu-west-3::foundation-model/amazon.nova-micro-v1:0
                - arn:aws:bedrock:eu-central-1::foundation-model/amazon.nova-micro-v1:0
                - arn:aws:bedrock:eu-north-1::foundation-model/amazon.nova-micro-v1:0
              Condition:
                StringLike:
                  bedrock:InferenceProfileArn: arn:aws:bedrock:eu-west-1:344774635844:inference-profile/eu.amazon.nova-micro-v1:0
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowHeaders:
            - Content-Type
          AllowMethods:
            - POST
          MaxAge: 600
      Tags:
        Project: aws-cloud-ai-web
        Component: backend
        ManagedBy: aws-sam
        Environment: portfolio

  QuestionHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${QuestionHandlerFunction}
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: aws-cloud-ai-web
        - Key: Component
          Value: backend
        - Key: ManagedBy
          Value: aws-sam
        - Key: Environment
          Value: portfolio

Outputs:
  BackendStackName:
    Description: CloudFormation stack name for the backend deployment.
    Value: !Ref AWS::StackName

  QuestionHandlerFunctionName:
    Description: Deployed Lambda function name.
    Value: !Ref QuestionHandlerFunction

  QuestionHandlerFunctionUrl:
    Description: Public Lambda Function URL for the backend.
    Value: !GetAtt QuestionHandlerFunctionUrl.FunctionUrl

  QuestionHandlerLogGroupName:
    Description: CloudWatch log group used by the backend Lambda function.
    Value: !Ref QuestionHandlerLogGroup
